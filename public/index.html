<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Preview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #fafafa;
            --bg-secondary: #ffffff;
            --text-primary: #111111;
            --text-secondary: #666666;
            --text-tertiary: #999999;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --accent-light: rgba(99, 102, 241, 0.08);
            --border-color: #e5e5e5;
            --error-color: #ef4444;
            --error-bg: rgba(239, 68, 68, 0.06);
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.12);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --transition-fast: 150ms ease;
            --transition-base: 250ms ease;
            --transition-slow: 400ms cubic-bezier(0.16, 1, 0.3, 1);
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            line-height: 1.6;
        }

        /* Subtle background pattern */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(99, 102, 241, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(99, 102, 241, 0.02) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 560px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        /* Header */
        .header {
            text-align: center;
            animation: fadeInDown 0.6s var(--transition-slow) both;
        }

        .header-icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 20px;
            background: var(--accent-light);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
        }

        .header-icon svg {
            width: 24px;
            height: 24px;
        }

        .title {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 1rem;
            font-weight: 400;
            color: var(--text-secondary);
            max-width: 360px;
            margin: 0 auto;
        }

        /* Search Section */
        .search-section {
            width: 100%;
            animation: fadeInUp 0.6s var(--transition-slow) 0.1s both;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
            display: flex;
            align-items: stretch;
            background: var(--bg-secondary);
            border: 1.5px solid var(--border-color);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: all var(--transition-base);
            box-shadow: var(--shadow-sm);
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-light), var(--shadow-md);
        }

        .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-tertiary);
            pointer-events: none;
            transition: color var(--transition-fast);
        }

        .input-wrapper:focus-within .input-icon {
            color: var(--accent);
        }

        .url-input {
            flex: 1;
            padding: 18px 18px 18px 52px;
            font-family: inherit;
            font-size: 0.9375rem;
            font-weight: 400;
            color: var(--text-primary);
            background: transparent;
            border: none;
            outline: none;
            min-width: 0;
        }

        .url-input::placeholder {
            color: var(--text-tertiary);
        }

        .submit-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 18px 28px;
            font-family: inherit;
            font-size: 0.9375rem;
            font-weight: 600;
            color: #ffffff;
            background: var(--accent);
            border: none;
            cursor: pointer;
            transition: all var(--transition-fast);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .submit-btn:hover:not(:disabled) {
            background: var(--accent-hover);
        }

        .submit-btn:active:not(:disabled) {
            transform: scale(0.98);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .submit-btn .btn-text {
            display: inline-block;
        }

        .submit-btn .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        .submit-btn.loading .btn-text {
            display: none;
        }

        .submit-btn.loading .spinner {
            display: block;
        }

        /* Result Section */
        .result-section {
            width: 100%;
            min-height: 120px;
            animation: fadeInUp 0.5s var(--transition-slow) both;
        }

        /* Preview Card */
        .preview-card {
            display: block;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            /* Preparado para receber a borda colorida via JS */
            border-left: 4px solid var(--border-color); 
            border-radius: var(--radius-lg);
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            box-shadow: var(--shadow-sm);
            transition: all var(--transition-base);
            transform: translateY(0);
        }

        .preview-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .preview-card:active {
            transform: translateY(-2px);
        }

        .card-image-wrapper {
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            background: linear-gradient(135deg, #f5f5f5 0%, #eaeaea 100%);
        }

        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform var(--transition-slow);
        }

        .preview-card:hover .card-image {
            transform: scale(1.02);
        }

        .card-content {
            padding: 20px;
        }

        .card-site-name {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 10px;
        }

        /* Estilo do Favicon */
        .card-favicon {
            width: 16px;
            height: 16px;
            border-radius: 3px;
            object-fit: contain;
        }

        .card-site-name svg {
            width: 14px;
            height: 14px;
        }

        .card-title {
            font-size: 1.125rem;
            font-weight: 600;
            line-height: 1.35;
            color: var(--text-primary);
            margin-bottom: 8px;
            letter-spacing: -0.01em;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-description {
            font-size: 0.875rem;
            font-weight: 400;
            line-height: 1.55;
            color: var(--text-secondary);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-url {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid var(--border-color);
            font-size: 0.8125rem;
            color: var(--text-tertiary);
        }

        .card-url svg {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }

        .card-url-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Error State */
        .error-message {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            padding: 18px 20px;
            background: var(--error-bg);
            border: 1px solid rgba(239, 68, 68, 0.15);
            border-radius: var(--radius-md);
            animation: shake 0.4s ease-in-out;
        }

        .error-icon {
            flex-shrink: 0;
            width: 20px;
            height: 20px;
            color: var(--error-color);
            margin-top: 1px;
        }

        .error-content {
            flex: 1;
            min-width: 0;
        }

        .error-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--error-color);
            margin-bottom: 4px;
        }

        .error-text {
            font-size: 0.8125rem;
            color: var(--error-color);
            opacity: 0.85;
            line-height: 1.5;
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px;
            text-align: center;
            color: var(--text-tertiary);
        }

        .empty-icon {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
            opacity: 0.4;
        }

        .empty-text {
            font-size: 0.875rem;
            font-weight: 400;
        }

        /* Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        /* Hidden utility */
        .hidden {
            display: none !important;
        }

        /* Responsive */
        @media (max-width: 480px) {
            body { padding: 16px; }
            .container { gap: 32px; }
            .title { font-size: 1.625rem; }
            .subtitle { font-size: 0.9375rem; }
            .url-input { padding: 16px 16px 16px 48px; font-size: 0.875rem; }
            .submit-btn { padding: 16px 22px; font-size: 0.875rem; }
            .card-content { padding: 16px; }
            .card-title { font-size: 1rem; }
            .card-description { font-size: 0.8125rem; }
        }

        /* Focus visible for accessibility */
        .submit-btn:focus-visible,
        .preview-card:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }
    </style>
</head>
<body>
    <main class="container">
        <header class="header">
            <div class="header-icon">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
                </svg>
            </div>
            <h1 class="title">Link Preview</h1>
            <p class="subtitle">Cole qualquer URL para gerar uma prévia elegante do conteúdo</p>
        </header>

        <section class="search-section">
            <form id="previewForm" autocomplete="off">
                <div class="input-wrapper">
                    <span class="input-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"/>
                            <path d="m21 21-4.35-4.35"/>
                        </svg>
                    </span>
                    <input type="url" id="urlInput" class="url-input" placeholder="https://exemplo.com/artigo-interessante" aria-label="URL para preview" required>
                    <button type="submit" class="submit-btn" id="submitBtn">
                        <span class="btn-text">Preview</span>
                        <span class="spinner"></span>
                    </button>
                </div>
            </form>
        </section>

        <section class="result-section" id="resultSection" aria-live="polite">
            <div class="empty-state" id="emptyState">
                <svg class="empty-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                    <line x1="3" y1="9" x2="21" y2="9"/>
                    <line x1="9" y1="21" x2="9" y2="9"/>
                </svg>
                <p class="empty-text">Digite uma URL acima para ver a prévia</p>
            </div>

            <div class="error-message hidden" id="errorMessage">
                <svg class="error-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="15" y1="9" x2="9" y2="15"/>
                    <line x1="9" y1="9" x2="15" y2="15"/>
                </svg>
                <div class="error-content">
                    <p class="error-title">Erro ao carregar preview</p>
                    <p class="error-text" id="errorText">Não foi possível obter os metadados desta URL.</p>
                </div>
            </div>

            <a href="#" target="_blank" rel="noopener noreferrer" class="preview-card hidden" id="previewCard">
                <div class="card-image-wrapper hidden" id="imageWrapper">
                    <img src="" alt="" class="card-image" id="cardImage">
                </div>
                <div class="card-content">
                    <span class="card-site-name">
                        <svg id="defaultSiteIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="2" y1="12" x2="22" y2="12"/>
                            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                        </svg>
                        
                        <img src="" alt="Icone do Site" id="cardFavicon" class="card-favicon hidden">
                        
                        <span id="siteName">Site</span>
                    </span>
                    <h2 class="card-title" id="cardTitle">Título da Página</h2>
                    <p class="card-description" id="cardDescription">Descrição do conteúdo da página aparecerá aqui.</p>
                    <div class="card-url">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                            <polyline points="15 3 21 3 21 9"/>
                            <line x1="10" y1="14" x2="21" y2="3"/>
                        </svg>
                        <span class="card-url-text" id="cardUrl">https://exemplo.com</span>
                    </div>
                </div>
            </a>
        </section>
    </main>

    <script>
        // DOM Elements
        const form = document.getElementById('previewForm');
        const urlInput = document.getElementById('urlInput');
        const submitBtn = document.getElementById('submitBtn');
        const emptyState = document.getElementById('emptyState');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const previewCard = document.getElementById('previewCard');
        const imageWrapper = document.getElementById('imageWrapper');
        const cardImage = document.getElementById('cardImage');
        const siteName = document.getElementById('siteName');
        const cardTitle = document.getElementById('cardTitle');
        const cardDescription = document.getElementById('cardDescription');
        const cardUrl = document.getElementById('cardUrl');
        
        // Elementos Novos
        const defaultSiteIcon = document.getElementById('defaultSiteIcon');
        const cardFavicon = document.getElementById('cardFavicon');

        function showElement(el) { el.classList.remove('hidden'); }
        function hideElement(el) { el.classList.add('hidden'); }

        function resetResult() {
            hideElement(emptyState);
            hideElement(errorMessage);
            hideElement(previewCard);
        }

        function setLoading(isLoading) {
            if (isLoading) {
                submitBtn.classList.add('loading');
                submitBtn.disabled = true;
                resetResult();
            } else {
                submitBtn.classList.remove('loading');
                submitBtn.disabled = false;
            }
        }

        function showError(message) {
            errorText.textContent = message || 'Não foi possível obter os metadados desta URL.';
            showElement(errorMessage);
            hideElement(emptyState);
            hideElement(previewCard);
        }

        function showPreview(data) {
            siteName.textContent = data.site_name || 'Website';
            cardTitle.textContent = data.title || 'Sem título';
            cardDescription.textContent = data.description || '';
            
            try {
                const urlObj = new URL(data.original_url || '');
                cardUrl.textContent = urlObj.hostname + urlObj.pathname;
            } catch {
                cardUrl.textContent = data.original_url || '';
            }

            previewCard.href = data.original_url || '#';

            if (data.image && data.image.trim() !== '') {
                cardImage.src = data.image;
                cardImage.alt = data.title || 'Imagem de preview';
                showElement(imageWrapper);
            } else {
                hideElement(imageWrapper);
            }

            // --- Lógica do Favicon ---
            if (data.favicon && data.favicon.trim() !== '') {
                cardFavicon.src = data.favicon;
                showElement(cardFavicon);
                hideElement(defaultSiteIcon);
            } else {
                hideElement(cardFavicon);
                showElement(defaultSiteIcon);
            }

            // --- Lógica da Cor Tema ---
            if (data.theme_color) {
                previewCard.style.borderLeftColor = data.theme_color;
            } else {
                previewCard.style.borderLeftColor = 'var(--border-color)'; // Reseta para cinza
            }

            showElement(previewCard);
            hideElement(emptyState);
            hideElement(errorMessage);

            previewCard.style.animation = 'none';
            previewCard.offsetHeight; 
            previewCard.style.animation = '';
        }

        async function fetchPreview(url) {
            setLoading(true);

            try {
                const response = await fetch(`/api/preview?url=${encodeURIComponent(url)}`);

                if (!response.ok) {
                    let errorMsg = `Erro ${response.status}: Não foi possível processar esta URL.`;
                    try {
                        const errorData = await response.json();
                        if (errorData.error || errorData.message) {
                            errorMsg = errorData.error || errorData.message;
                        }
                    } catch {}
                    throw new Error(errorMsg);
                }

                const data = await response.json();
                if (!data || typeof data !== 'object') {
                    throw new Error('Resposta inválida da API.');
                }

                showPreview(data);

            } catch (error) {
                showError(error.message || 'Erro desconhecido ao buscar preview.');
            } finally {
                setLoading(false);
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const url = urlInput.value.trim();
            if (!url) {
                urlInput.focus();
                return;
            }
            try { new URL(url); } catch {
                showError('Por favor, insira uma URL válida.');
                return;
            }
            await fetchPreview(url);
        });

        urlInput.addEventListener('focus', () => { urlInput.parentElement.style.transform = 'scale(1.01)'; });
        urlInput.addEventListener('blur', () => { urlInput.parentElement.style.transform = 'scale(1)'; });

        previewCard.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                previewCard.click();
            }
        });
    </script>
</body>
</html>
